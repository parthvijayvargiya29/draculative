# configs/scheduler.yaml
# ========================
# APScheduler configuration for core/weekly_ict2_report.py
# and any other scheduled tasks in the Draculative Alpha Engine.

scheduler:
  # Timezone for all cron expressions
  timezone: "US/Eastern"

  # ICT2 Weekly Report — every Friday at 18:00 ET
  weekly_report_cron:
    day_of_week: fri
    hour: 18
    minute: 0

  # (Optional) Daily pre-market scan — every weekday at 06:30 ET
  daily_scan_cron:
    day_of_week: "mon-fri"
    hour: 6
    minute: 30

  # (Optional) Intraday refresh — every 30 minutes during NY session
  intraday_cron:
    day_of_week: "mon-fri"
    hour: "9-16"
    minute: "0,30"

# Paths
paths:
  weekly_report_dir: "reports/weekly"
  ict2_validation_report: "data/ict2_validation_report.yaml"

# Notification (optional — fill in to enable Slack/email alerts)
notifications:
  slack_webhook_url: ""         # e.g. https://hooks.slack.com/services/...
  email_to: ""                  # e.g. you@example.com
  email_from: ""
  smtp_host: "smtp.gmail.com"
  smtp_port: 587

# Universe symbols for scheduled scans
universe:
  symbols:
    - SPY
    - QQQ
    - VXX
    - TLT
    - GLD
    - UUP
    - XLK
    - XLF
    - XLE
    - XLV
    - XLI
    - XLY
    - XLP
    - XLU
    - XLRE
    - XLC
    - NVDA
    - AAPL
    - MSFT
    - GOOGL
    - META
    - AMZN
    - TSLA
