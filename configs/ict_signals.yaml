# configs/ict_signals.yaml
# All thresholds for trading_system/ict_signals/ modules.
# No values are hardcoded in the Python modules — all numeric
# parameters must be loaded from this file at module init.

# ── Kill Zone Filter ────────────────────────────────────────────────────────
kill_zone:
  timezone: "US/Eastern"
  zones:
    asia:
      start: "20:00"       # prior day Eastern
      end:   "00:00"
      strength: 0.6
    london:
      start: "02:00"
      end:   "05:00"
      strength: 1.0
    ny_open:
      start: "07:00"
      end:   "10:00"
      strength: 0.9
    ny_lunch:
      start: "12:00"
      end:   "13:00"
      strength: 0.0        # avoid — low volume
    ny_pm:
      start: "13:30"
      end:   "16:00"
      strength: 0.7
  daily_bar_strength: 0.5   # for daily OHLCV bars with no intraday time

# ── Displacement Detector ───────────────────────────────────────────────────
displacement:
  atr_period: 14
  body_atr_multiple: 2.0       # middle candle body > N × ATR
  opposing_body_max_pct: 0.30  # opposing candle body may not exceed 30% of middle
  volume_multiplier: 1.3       # middle candle volume ≥ N × 20-bar avg
  volume_lookback: 20
  lookback_bars: 50            # bars to scan for displacements

# ── NWOG / NMOG Detector ────────────────────────────────────────────────────
nwog:
  max_active_nwogs: 4          # keep last N unfilled NWOGs in memory
  max_active_nmogs: 2
  fill_tolerance_pct: 0.10     # CE is considered "tagged" if price comes within 0.10%
  bias_weight_proximity_pct: 2.0  # if nearest CE within 2% of price, bias counts

# ── Propulsion Block Detector ────────────────────────────────────────────────
propulsion_block:
  displacement_lookback: 5     # look back N bars from a confirmed displacement
  fvg_confluence_distance_pct: 0.50  # within 0.5% of an FVG = confluence bonus
  ote_fib_lo: 0.618
  ote_fib_hi: 0.786
  atr_period: 14
  max_active_blocks: 10

# ── Balanced Price Range ─────────────────────────────────────────────────────
balanced_price_range:
  fvg_lookback: 60             # bars to scan for FVGs to form BPRs
  min_overlap_pct: 0.0         # overlap_top > overlap_bottom (any positive overlap)
  fill_tolerance_pct: 0.10     # CE considered mitigated if price within 0.10%
  max_active_bprs: 8

# ── Turtle Soup Detector ─────────────────────────────────────────────────────
turtle_soup:
  swing_lookback: 20           # bars to identify prior swing high/low
  min_raid_atr_multiple: 0.05  # raid must exceed prior level by ≥ ATR × 0.05
  atr_period: 14
  volume_multiplier: 1.0       # raid candle volume ≥ N × 20-bar avg
  volume_lookback: 20
  stop_atr_multiple: 0.5       # stop = raid extreme ± ATR × 0.5

# ── Power of Three ───────────────────────────────────────────────────────────
power_of_three:
  manipulation_min_atr: 0.30   # manipulation move ≥ 0.30 × ATR
  atr_period: 14
  distribution_ote_fib: 0.50   # distribution target at 50% of daily range (midpoint)
  lookback_bars: 5             # bars to look back for today's PO3 phases

# ── Silver Bullet Setup ──────────────────────────────────────────────────────
silver_bullet:
  fvg_creation_bar_pct: 0.30   # FVG must form in first 30% of session bars
  bos_lookback: 10             # bars to detect BOS after FVG
  min_risk_reward: 1.5         # minimum RR to consider setup valid
  atr_period: 14
  stop_atr_multiple: 1.0       # SL = entry ± ATR × 1.0

# ── Shared ATR / sizing ─────────────────────────────────────────────────────
shared:
  atr_period: 14
  tick_size: 0.01              # default tick size for equity; override per instrument
