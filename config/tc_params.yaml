# ── TC-14: Fibonacci OTE Zone Entry ─────────────────────────────────────────
tc_14:
  # Fibonacci levels
  ote_min: 0.618               # 61.8% retracement
  ote_max: 0.786               # 78.6% retracement
  invalidation_level: 0.886    # Stop beyond 88.6%
  
  # Swing detection (5-bar fractal)
  fractal_bars: 5
  
  # Risk management
  risk_per_trade: 0.01
  
  # Universe
