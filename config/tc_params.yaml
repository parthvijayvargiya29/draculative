# ── TC-13: Stochastic RSI Oversold Crossup ──────────────────────────────────
tc_13:
  # StochRSI parameters
  rsi_period: 14
  stoch_period: 14
  k_smooth: 3
  d_smooth: 3
  
  # Entry thresholds
  k_oversold: 20               # %K < 20 for LONG
  k_overbought: 80             # %K > 80 for SHORT
  rsi_long_max: 45             # Additional gate: RSI < 45 for LONG
  rsi_short_min: 55            # RSI > 55 for SHORT
  
  # Exit
  sl_atr_mult: 1.0
  target_k_level: 50           # StochRSI reaching 50 (neutralization)
  risk_per_trade: 0.01
  
  # Universe (Combo C symbols — mean reversion)
