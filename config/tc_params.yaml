    RANGING: 0.5


# ── TC-15: Pivot Point Breakout/Breakdown ───────────────────────────────────
tc_15:
  # Volume confirmation
  volume_mult: 1.3             # Volume > 1.3x average for breakout
  
  # Entry modes (both implemented, track which is better)
  use_retest: true             # Wait for re-test of level (higher WR)
  use_direct: true             # Direct break (more trades, lower WR)
  
  # Risk management
  risk_per_trade: 0.01
  
  # Universe
  symbols:
    - SPY
    - QQQ
    - IWM
    - DIA
    - XLK
  
  # Regime weights
  regime_weights:
    TRENDING: 0.8
    CORRECTIVE: 0.6
    HIGH_VOL: 0.3
    RANGING: 0.7
