<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading System Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 4px solid #4CAF50;
        }
        
        .status-card.error {
            border-left-color: #f44336;
        }
        
        .status-card.warning {
            border-left-color: #ff9800;
        }
        
        .status-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-value {
            font-size: 2em;
            font-weight: bold;
            color: #2196F3;
        }
        
        .symbols-section {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .symbols-section h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #2196F3;
            padding-bottom: 10px;
        }
        
        .symbol-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .symbol-item {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #e0e0e0;
        }
        
        .symbol-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #2196F3;
            margin-bottom: 8px;
        }
        
        .symbol-info {
            font-size: 0.9em;
            color: #666;
            line-height: 1.6;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1em;
            color: #999;
        }
        
        .refresh-button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            margin-top: 20px;
        }
        
        .refresh-button:hover {
            background: #1976D2;
        }
        
        .timestamp {
            color: #999;
            font-size: 0.85em;
            margin-top: 10px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Trading System Dashboard</h1>
            <p>Real-time TradingView Integration</p>
        </div>
        
        <div class="status-grid">
            <div class="status-card">
                <h3>Server Status</h3>
                <div class="status-value" id="server-status">🔄</div>
            </div>
            <div class="status-card">
                <h3>Alerts Received</h3>
                <div class="status-value" id="alerts-count">0</div>
            </div>
            <div class="status-card">
                <h3>Symbols Tracked</h3>
                <div class="status-value" id="symbols-count">0</div>
            </div>
            <div class="status-card error" id="errors-card">
                <h3>Errors</h3>
                <div class="status-value" id="errors-count">0</div>
            </div>
        </div>
        
        <div class="symbols-section">
            <h2>📊 Monitored Symbols</h2>
            <div id="symbols-container" class="loading">Loading...</div>
            <button class="refresh-button" onclick="refreshStatus()">🔄 Refresh</button>
            <div class="timestamp">Last updated: <span id="last-update">—</span></div>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('http://localhost:5001/tradingview/status');
                const data = await response.json();
                updateDashboard(data);
            } catch (error) {
                console.error('Error fetching status:', error);
                document.getElementById('symbols-container').innerHTML = 
                    '<div style="color: red; padding: 20px;">⚠️ Failed to connect to server</div>';
            }
        }
        
        function updateDashboard(data) {
            // Update status cards
            document.getElementById('server-status').textContent = data.server_running ? '✅ Running' : '⛔ Stopped';
            document.getElementById('alerts-count').textContent = data.alerts_received;
            document.getElementById('symbols-count').textContent = data.symbols_tracked;
            
            const errorsCard = document.getElementById('errors-card');
            if (data.errors > 0) {
                errorsCard.classList.add('error');
                document.getElementById('errors-count').textContent = data.errors;
            } else {
                errorsCard.classList.remove('error');
                document.getElementById('errors-count').textContent = '0';
            }
            
            // Update symbols list
            const symbolsContainer = document.getElementById('symbols-container');
            
            if (data.symbols_tracked === 0) {
                symbolsContainer.innerHTML = '<div style="padding: 20px; color: #999;">No symbols tracked yet. Waiting for TradingView alerts...</div>';
            } else {
                const symbolsHtml = Object.entries(data.symbols).map(([symbol, info]) => `
                    <div class="symbol-item">
                        <div class="symbol-name">${symbol}</div>
                        <div class="symbol-info">
                            <div class="info-row">
                                <span>Candles:</span>
                                <strong>${info.candle_count}</strong>
                            </div>
                            <div class="info-row">
                                <span>Price:</span>
                                <strong>$${info.latest_price ? parseFloat(info.latest_price).toFixed(2) : 'N/A'}</strong>
                            </div>
                        </div>
                    </div>
                `).join('');
                symbolsContainer.innerHTML = `<div class="symbol-list">${symbolsHtml}</div>`;
            }
            
            // Update timestamp
            const now = new Date();
            document.getElementById('last-update').textContent = now.toLocaleTimeString();
        }
        
        function refreshStatus() {
            fetchStatus();
        }
        
        // Initial load and refresh every 2 seconds
        fetchStatus();
        setInterval(fetchStatus, 2000);
    </script>
</body>
</html>
